# docker-compose.yml
# Local development stack — runs Postgres + pgAdmin

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: riskpilot_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: riskpilot
      POSTGRES_PASSWORD: riskpilot_dev
      POSTGRES_DB: riskpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riskpilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: riskpilot_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@riskpilot.io
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
